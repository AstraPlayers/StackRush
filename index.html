<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stack Rush</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    touch-action: none;
  }
  canvas { display: block; border-radius: 16px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = Math.min(420, window.innerWidth);
const H = Math.min(680, window.innerHeight);
canvas.width = W;
canvas.height = H;

// ─── PALETTE ───────────────────────────────────────────────
const COLORS = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF9F1C','#2EC4B6','#FF595E'];
const BG_TOP = '#0d0d2b';
const BG_BOT = '#1a0a2e';

// ─── STATE ─────────────────────────────────────────────────
let state, score, highScore, blocks, movingBlock, particles, combo, comboTimer, shake, level, flash;

function init() {
  state = 'menu'; // menu | play | over
  score = 0;
  highScore = parseInt(localStorage.getItem('sr_hi') || '0');
  blocks = [];
  particles = [];
  combo = 0;
  comboTimer = 0;
  shake = 0;
  level = 1;
  flash = 0;
  movingBlock = null;

  // Foundation block
  const bw = W * 0.55;
  blocks.push({ x: W/2 - bw/2, y: H - 100, w: bw, h: 28, color: COLORS[0] });
  spawnMoving();
}

function spawnMoving() {
  const prev = blocks[blocks.length - 1];
  const maxW = prev.w + 20;
  const bw = Math.max(40, maxW);
  const speed = 2.5 + level * 0.4 + Math.min(score * 0.015, 5);
  const dir = Math.random() < 0.5 ? 1 : -1;
  movingBlock = {
    x: dir > 0 ? -bw : W,
    y: prev.y - 36,
    w: bw,
    h: 28,
    vx: speed * dir,
    color: COLORS[(blocks.length) % COLORS.length],
    targetY: prev.y - 36,
    currentY: prev.y - 36,
  };
}

function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      color,
      r: 3 + Math.random() * 4,
    });
  }
}

function drop() {
  if (!movingBlock || state !== 'play') return;
  const prev = blocks[blocks.length - 1];

  const overlapStart = Math.max(movingBlock.x, prev.x);
  const overlapEnd = Math.min(movingBlock.x + movingBlock.w, prev.x + prev.w);
  const overlap = overlapEnd - overlapStart;

  if (overlap <= 0) {
    // Miss!
    shake = 14;
    flash = 0.4;
    combo = 0;
    spawnParticles(movingBlock.x + movingBlock.w/2, movingBlock.y + 14, movingBlock.color, 20);
    gameOver();
    return;
  }

  // Perfect bonus
  const perfectThreshold = 6;
  const isPerfect = Math.abs(movingBlock.x - prev.x) < perfectThreshold && Math.abs((movingBlock.x + movingBlock.w) - (prev.x + prev.w)) < perfectThreshold;

  if (isPerfect) {
    // Perfect: block keeps full width
    combo++;
    comboTimer = 90;
    spawnParticles(prev.x + prev.w/2, movingBlock.y + 14, '#FFD93D', 24);
    score += 10 + combo * 2;
    flash = 0.3;
    blocks.push({ x: prev.x, y: movingBlock.y, w: prev.w, h: movingBlock.h, color: movingBlock.color });
  } else {
    combo = 0;
    // Trim block
    const trimmedW = overlap;
    const trimmedX = overlapStart;
    spawnParticles(
      movingBlock.x < prev.x ? movingBlock.x + (prev.x - movingBlock.x)/2 : movingBlock.x + movingBlock.w - (movingBlock.x + movingBlock.w - prev.x - prev.w)/2,
      movingBlock.y + 14,
      movingBlock.color,
      8
    );
    blocks.push({ x: trimmedX, y: movingBlock.y, w: trimmedW, h: movingBlock.h, color: movingBlock.color });
    score += 5;
  }

  if (score > highScore) highScore = score;
  level = 1 + Math.floor(score / 30);

  // Scroll world down
  if (blocks.length > 6) {
    const scrollAmount = 36;
    blocks.forEach(b => b.y += scrollAmount);
    particles.forEach(p => p.y += scrollAmount);
  }

  // Remove old blocks below screen
  while (blocks.length > 20 && blocks[0].y > H + 100) blocks.shift();

  movingBlock = null;
  setTimeout(() => spawnMoving(), 80);
}

function gameOver() {
  state = 'over';
  localStorage.setItem('sr_hi', highScore);
  spawnParticles(W/2, H/2, '#FF6B6B', 30);
}

// ─── INPUT ─────────────────────────────────────────────────
function handleTap() {
  if (state === 'menu') {
    state = 'play';
    return;
  }
  if (state === 'play') {
    drop();
    return;
  }
  if (state === 'over') {
    init();
    state = 'play';
  }
}

canvas.addEventListener('pointerdown', handleTap);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowDown') { e.preventDefault(); handleTap(); }
});

// ─── DRAW HELPERS ───────────────────────────────────────────
function roundRect(x, y, w, h, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  ctx.fill();
}

function drawGlow(x, y, w, h, color) {
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = 18;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 8);
  ctx.fill();
  ctx.restore();
}

function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, BG_TOP);
  grad.addColorStop(1, BG_BOT);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  for (let i = 0; i < 40; i++) {
    const sx = ((i * 97 + 13) % W);
    const sy = ((i * 137 + 7) % H);
    const sr = 0.5 + (i % 3) * 0.5;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawBlock(b, highlight = false) {
  const r = 8;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.roundRect(b.x + 3, b.y + 5, b.w, b.h, r);
  ctx.fill();

  if (highlight) {
    drawGlow(b.x, b.y, b.w, b.h, b.color);
  } else {
    roundRect(b.x, b.y, b.w, b.h, r, b.color);
  }

  // Shine strip
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.roundRect(b.x + 6, b.y + 4, b.w - 12, 6, 3);
  ctx.fill();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    const pr = Math.max(0, p.r * p.life);
    ctx.beginPath();
    ctx.arc(p.x, p.y, pr, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawUI() {
  // Score
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = `bold ${score > 99 ? 42 : 48}px 'Segoe UI', sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(score, W/2, 72);

  // High score badge
  ctx.font = '14px Segoe UI';
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillText(`MEILLEUR: ${highScore}`, W/2, 96);

  // Combo badge
  if (combo >= 2 && comboTimer > 0) {
    const alpha = Math.min(1, comboTimer / 20);
    ctx.globalAlpha = alpha;
    const bx = W/2;
    const by = 130;
    ctx.fillStyle = '#FFD93D';
    ctx.font = `bold 22px Segoe UI`;
    ctx.fillText(`🔥 COMBO x${combo}!`, bx, by);
    ctx.globalAlpha = 1;
  }

  // Level pill
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.roundRect(W - 80, 20, 64, 28, 14);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '13px Segoe UI';
  ctx.textAlign = 'center';
  ctx.fillText(`LVL ${level}`, W - 48, 39);
}

function drawMenu() {
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.font = 'bold 52px Segoe UI';
  ctx.textAlign = 'center';
  ctx.fillText('STACK', W/2, H/2 - 60);
  ctx.fillText('RUSH', W/2, H/2 - 2);

  ctx.font = '17px Segoe UI';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('Appuie pour jouer', W/2, H/2 + 50);

  // Animated arrow
  const bounce = Math.sin(Date.now() / 400) * 6;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '28px Segoe UI';
  ctx.fillText('↓', W/2, H/2 + 90 + bounce);
}

function drawGameOver() {
  // Overlay
  ctx.fillStyle = 'rgba(10,10,26,0.82)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#FF6B6B';
  ctx.font = 'bold 38px Segoe UI';
  ctx.fillText('RATÉ!', W/2, H/2 - 80);

  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = 'bold 60px Segoe UI';
  ctx.fillText(score, W/2, H/2 - 20);

  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = '16px Segoe UI';
  ctx.fillText('Score', W/2, H/2 + 10);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#FFD93D';
    ctx.font = 'bold 20px Segoe UI';
    ctx.fillText('🏆 NOUVEAU RECORD!', W/2, H/2 + 50);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '15px Segoe UI';
    ctx.fillText(`Meilleur: ${highScore}`, W/2, H/2 + 50);
  }

  // Replay button
  const bx = W/2 - 90, by = H/2 + 80, bw = 180, bh = 50;
  ctx.fillStyle = '#6BCB77';
  ctx.shadowColor = '#6BCB77';
  ctx.shadowBlur = 16;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 25);
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px Segoe UI';
  ctx.fillText('▶  REJOUER', W/2, by + 32);

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '14px Segoe UI';
  ctx.fillText('(Espace ou Tap)', W/2, H/2 + 162);
}

// ─── GAME LOOP ──────────────────────────────────────────────
let lastTime = 0;

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  // Update
  if (state === 'play' && movingBlock) {
    movingBlock.x += movingBlock.vx * dt;
    // Bounce off walls
    if (movingBlock.x < -movingBlock.w - 20 || movingBlock.x > W + 20) {
      movingBlock.vx *= -1;
    }
  }

  // Particles
  particles = particles.filter(p => p.life > 0.02);
  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.15 * dt;
    p.life -= 0.025 * dt;
    p.r *= 0.99;
  });

  if (comboTimer > 0) comboTimer -= dt;
  if (shake > 0) shake = Math.max(0, shake - dt * 1.2);
  if (flash > 0) flash = Math.max(0, flash - dt * 0.04);

  // Draw
  const sx = shake > 0 ? (Math.random() - 0.5) * shake : 0;
  const sy = shake > 0 ? (Math.random() - 0.5) * shake * 0.5 : 0;
  ctx.save();
  ctx.translate(sx, sy);

  drawBg();

  // Flash overlay
  if (flash > 0) {
    ctx.fillStyle = `rgba(255,80,80,${flash})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Blocks
  blocks.forEach((b, i) => {
    drawBlock(b, i === blocks.length - 1 && state === 'play');
  });

  // Moving block
  if (state === 'play' && movingBlock) {
    drawBlock(movingBlock, true);

    // Drop hint line
    const prev = blocks[blocks.length - 1];
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(prev.x, movingBlock.y + movingBlock.h);
    ctx.lineTo(prev.x + prev.w, movingBlock.y + movingBlock.h);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  drawParticles();

  if (state === 'menu') drawMenu();
  if (state === 'play') drawUI();
  if (state === 'over') { drawUI(); drawGameOver(); }

  ctx.restore();
  requestAnimationFrame(loop);
}

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
